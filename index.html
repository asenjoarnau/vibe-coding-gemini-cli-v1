<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Moto Highway - 300 KM/H SONIC</title>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            border: 6px solid #00f2ff;
            border-radius: 15px;
            box-shadow: 0 0 100px rgba(0, 242, 255, 0.4);
        }
        canvas {
            background: #050505;
            display: block;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 5px; /* Movido más a la izquierda */
            pointer-events: none;
            background: rgba(0,0,0,0.95);
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #00f2ff;
            z-index: 10;
        }
        .stat { font-size: 16px; font-weight: bold; margin-bottom: 3px; }
        #score-val { color: #00ff00; }
        #speed-val { color: #00f2ff; font-size: 24px; font-style: italic; text-shadow: 0 0 15px #00f2ff; }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,1);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            display: none;
            border: 4px solid #00f2ff;
            width: 320px;
        }
        button {
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            background: #00f2ff;
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 25px;
            text-transform: uppercase;
        }
        button:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div class="stat">PTS: <span id="score-val">0</span></div>
        <div class="stat"><span id="speed-val">100</span> KM/H</div>
    </div>
    <div id="game-over">
        <h1 style="color: #00f2ff; margin: 0; font-size: 40px;">CRITICAL FAILURE</h1>
        <p style="font-size: 24px; margin: 20px 0;">Record: <span id="final-score">0</span></p>
        <button onclick="resetGame()">REBOOT</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('score-val');
    const speedVal = document.getElementById('speed-val');
    const gameOverEl = document.getElementById('game-over');
    const finalScoreEl = document.getElementById('final-score');

    canvas.width = 400;
    canvas.height = 750;

    const LANES = [85, 175, 265];
    let gameActive = true;
    let score = 0;
    
    let baseSpeed = 5.0; // Inicia a 100 km/h
    const MAX_BASE_SPEED = 15.0; // 300 km/h máximo
    
    let spawnTimer = 0;
    let roadOffset = 0;
    let cars = [];

    const player = {
        x: canvas.width / 2 - 17,
        y: canvas.height - 130,
        w: 34,
        h: 60,
        speed: 6.5, // Más ágil para los 300 km/h
        color: '#ffcc00'
    };

    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    class EnemyCar {
        constructor(laneIndex) {
            this.w = 52;
            this.h = 95;
            this.lane = laneIndex;
            this.x = LANES[this.lane];
            this.y = -200;
            this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            this.passed = false;
        }
        update() {
            this.y += baseSpeed; 

            if (player.x < this.x + this.w &&
                player.x + player.w > this.x &&
                player.y < this.y + this.h &&
                player.y + player.h > this.y) {
                endGame();
            }

            if (this.y > canvas.height && !this.passed) {
                this.passed = true;
                score++;
                scoreVal.innerText = score;
                
                // Aceleración hacia los 300 km/h
                if (baseSpeed < MAX_BASE_SPEED) {
                    baseSpeed += 0.2; 
                }
            }
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.roundRect(this.x, this.y, this.w, this.h, 5);
            ctx.fill();
            // Luces cibernéticas
            ctx.fillStyle = '#00f2ff';
            ctx.fillRect(this.x + 4, this.y + 10, this.w - 8, 20);
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(this.x + 2, this.y + this.h - 5, 12, 3);
            ctx.fillRect(this.x + this.w - 14, this.y + this.h - 5, 12, 3);
        }
    }

    function drawRoad() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(70, 0, canvas.width - 140, canvas.height);
        
        ctx.fillStyle = '#00f2ff';
        ctx.fillRect(72, 0, 3, canvas.height);
        ctx.fillRect(canvas.width - 75, 0, 3, canvas.height);

        // Líneas de carril
        ctx.setLineDash([80, 160]);
        ctx.lineDashOffset = -roadOffset;
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.2)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(150, 0); ctx.lineTo(150, canvas.height);
        ctx.moveTo(250, 0); ctx.lineTo(250, canvas.height);
        ctx.stroke();
        
        roadOffset += baseSpeed;
    }

    function drawPlayer() {
        ctx.save();
        // Efecto vibración a 300 km/h
        let shake = 0;
        if (baseSpeed > 13) {
            shake = (Math.random() - 0.5) * 2;
        }

        ctx.translate(shake, shake);
        
        if (baseSpeed > 12) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00f2ff';
        }
        
        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.roundRect(player.x, player.y, player.w, player.h, 15);
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(player.x + player.w/2, player.y + 25, 10, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }

    function update() {
        if (!gameActive) return;

        if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 75) player.x -= player.speed;
        if ((keys['ArrowRight'] || keys['KeyD']) && player.x < canvas.width - 75 - player.w) player.x += player.speed;

        speedVal.innerText = Math.floor(baseSpeed * 20);

        spawnTimer++;
        if (spawnTimer > 25 && cars.length < 2) {
            let occupiedLanes = cars.map(c => c.lane);
            let availableLanes = [0, 1, 2].filter(l => !occupiedLanes.includes(l));
            
            let randomLane = availableLanes[Math.floor(Math.random() * availableLanes.length)];
            cars.push(new EnemyCar(randomLane));
            spawnTimer = 0;
        }

        cars.forEach(car => car.update());
        cars = cars.filter(car => car.y < canvas.height + 250);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawRoad();
        cars.forEach(car => car.draw());
        drawPlayer();
    }

    function gameLoop() {
        update();
        draw();
        if (gameActive) requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameActive = false;
        gameOverEl.style.display = 'block';
        finalScoreEl.innerText = score;
    }

    function resetGame() {
        score = 0;
        baseSpeed = 5.0;
        spawnTimer = 0;
        cars = [];
        player.x = canvas.width / 2 - 17;
        gameActive = true;
        scoreVal.innerText = '0';
        gameOverEl.style.display = 'none';
        gameLoop();
    }

    gameLoop();
</script>
</body>
</html>
