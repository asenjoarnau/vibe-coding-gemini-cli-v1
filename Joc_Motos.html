<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moto Highway Racer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 4px solid #444;
        }

        canvas {
            display: block;
            background: #000;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }

        .stat {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            margin-bottom: 5px;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #ff4444;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        button:hover {
            background: #cc3333;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div class="stat">PUNTOS: <span id="score">0</span></div>
        <div class="stat">VELOCIDAD: <span id="speed">0</span> km/h</div>
    </div>
    <div id="game-over">
        <h1>¡HAS CHOCADO!</h1>
        <p>Puntuación final: <span id="final-score">0</span></p>
        <button onclick="resetGame()">REINTENTAR</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const speedEl = document.getElementById('speed');
    const gameOverEl = document.getElementById('game-over');
    const finalScoreEl = document.getElementById('final-score');

    // Configuración
    canvas.width = 800;
    canvas.height = 600;

    const COLORS = {
        SKY: '#72D1F6',
        TREE: '#009A0D',
        FOG: '#92D1F6',
        ROAD: '#4A4A4A',
        GRASS: '#10AA10',
        RUMBLE: '#BBBBBB',
        LANE: '#FFFFFF'
    };

    let score = 0;
    let speed = 0;
    let maxSpeed = 150;
    let accel = 0.2;
    let pos = 0; // Posición en la carretera
    let playerX = 0; // -1 a 1 (izquierda a derecha)
    let playerLane = 0; // -1, 0, 1
    let targetX = 0;
    let gameActive = true;
    let cars = [];
    let carSpawnTimer = 0;

    // Teclado
    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLane(-1);
        if (e.code === 'ArrowRight' || e.code === 'KeyD') moveLane(1);
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function moveLane(dir) {
        if (!gameActive) return;
        playerLane = Math.max(-1, Math.min(1, playerLane + dir));
        targetX = playerLane * 0.6;
    }

    class Car {
        constructor() {
            this.z = 2000; // Distancia inicial
            this.lane = Math.floor(Math.random() * 3) - 1; // -1, 0, 1
            this.x = this.lane * 0.6;
            this.speed = speed * 0.5 + Math.random() * 20;
            this.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
            this.passed = false;
        }

        update(dt) {
            this.z -= speed * dt * 0.5;
            if (this.z < 0 && !this.passed) {
                this.passed = true;
                if (Math.abs(this.x - playerX) < 0.3) {
                    endGame();
                } else {
                    score++;
                    scoreEl.innerText = score;
                }
            }
        }

        draw() {
            if (this.z <= 0 || this.z > 2000) return;

            const factor = 400 / this.z;
            const x = canvas.width/2 + (this.x - playerX) * factor * canvas.width/2;
            const y = canvas.height/2 + factor * canvas.height/2;
            const w = 150 * factor;
            const h = 80 * factor;

            if (y < canvas.height/2) return;

            ctx.fillStyle = this.color;
            ctx.fillRect(x - w/2, y - h, w, h);
            
            // Techo
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(x - w/2, y - h, w, h/2);
            
            // Luces traseras
            ctx.fillStyle = 'red';
            ctx.fillRect(x - w/2 + 5*factor, y - h + 40*factor, 20*factor, 10*factor);
            ctx.fillRect(x + w/2 - 25*factor, y - h + 40*factor, 20*factor, 10*factor);
        }
    }

    function drawRoad() {
        // Fondo (Cielo)
        ctx.fillStyle = COLORS.SKY;
        ctx.fillRect(0, 0, canvas.width, canvas.height / 2);

        // Paisaje (Montañas distantes)
        ctx.fillStyle = '#4B7D42';
        ctx.beginPath();
        ctx.moveTo(0, canvas.height/2);
        ctx.lineTo(200, canvas.height/2 - 50);
        ctx.lineTo(400, canvas.height/2);
        ctx.lineTo(600, canvas.height/2 - 70);
        ctx.lineTo(800, canvas.height/2);
        ctx.fill();

        // Suelo (Césped)
        ctx.fillStyle = COLORS.GRASS;
        ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

        // Carretera (Perspectiva)
        const roadW = canvas.width * 0.8;
        const horizonY = canvas.height / 2;
        
        ctx.fillStyle = COLORS.ROAD;
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2 - 20, horizonY);
        ctx.lineTo(canvas.width / 2 + 20, horizonY);
        ctx.lineTo(canvas.width, canvas.height);
        ctx.lineTo(0, canvas.height);
        ctx.fill();

        // Líneas de carriles
        const lines = 10;
        const lineLength = 50;
        const spacing = 100;
        const offset = (pos * 5) % spacing;

        ctx.strokeStyle = COLORS.LANE;
        ctx.setLineDash([20, 20]);
        ctx.lineWidth = 2;

        // Carril izquierdo
        drawLaneLine(-0.33);
        // Carril derecho
        drawLaneLine(0.33);
    }

    function drawLaneLine(lanePos) {
        const horizonY = canvas.height / 2;
        ctx.beginPath();
        ctx.moveTo(canvas.width/2 + lanePos * 40, horizonY);
        ctx.lineTo(canvas.width/2 + lanePos * canvas.width * 1.5, canvas.height);
        ctx.stroke();
    }

    function drawPlayer() {
        const x = canvas.width / 2;
        const y = canvas.height - 50;
        
        // Sombra
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(x, y + 10, 40, 10, 0, 0, Math.PI * 2);
        ctx.fill();

        // Moto (simplificada)
        ctx.fillStyle = '#333'; // Ruedas/Cuerpo
        ctx.fillRect(x - 15, y - 60, 30, 60);
        
        ctx.fillStyle = '#f00'; // Color moto
        ctx.fillRect(x - 12, y - 50, 24, 30);
        
        ctx.fillStyle = '#555'; // Manillar
        ctx.fillRect(x - 25, y - 55, 50, 5);

        // Casco
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x, y - 65, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.fillRect(x - 8, y - 70, 16, 6);
    }

    function update(dt) {
        if (!gameActive) return;

        // Aceleración
        if (speed < maxSpeed) speed += accel;
        speedEl.innerText = Math.floor(speed);

        // Movimiento lateral suave
        playerX += (targetX - playerX) * 0.1;

        // Posición carretera
        pos += speed * dt;

        // Spawn de coches
        carSpawnTimer -= dt * speed;
        if (carSpawnTimer <= 0) {
            cars.push(new Car());
            carSpawnTimer = 1000 + Math.random() * 2000;
            // Aumentar dificultad
            if (maxSpeed < 300) maxSpeed += 1;
        }

        // Actualizar coches
        cars.forEach(car => car.update(dt));
        cars = cars.filter(car => car.z > -100);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawRoad();
        
        // Ordenar coches por profundidad para dibujarlos correctamente
        cars.sort((a, b) => b.z - a.z);
        cars.forEach(car => car.draw());
        
        drawPlayer();
    }

    let lastTime = 0;
    function gameLoop(timestamp) {
        const dt = timestamp - lastTime;
        lastTime = timestamp;

        update(dt || 0);
        draw();

        requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameActive = false;
        speed = 0;
        gameOverEl.style.display = 'block';
        finalScoreEl.innerText = score;
    }

    function resetGame() {
        score = 0;
        speed = 0;
        maxSpeed = 150;
        pos = 0;
        playerLane = 0;
        targetX = 0;
        playerX = 0;
        cars = [];
        scoreEl.innerText = '0';
        gameOverEl.style.display = 'none';
        gameActive = true;
    }

    requestAnimationFrame(gameLoop);
</script>

</body>
</html>
